<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>habitat — For users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icons/habitat.png" type="image/png">
</head>

<body>
    <div class="app">

        <!-- Background -->
        <div class="background-container">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="dot-grid"></div>
        </div>

        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">
                <div class="nav-logo">
                    <svg fill="none" viewBox="0 0 80 80" width="100%" height="100%">
                        <path d="M80 24C80 37.2548 69.2548 48 56 48H40V24C40 19.5817 43.5817 16 48 16H80V24Z"
                            fill="#2A7047" />
                        <path
                            d="M32 80H24V48C24 43.5817 20.4183 40 16 40H8C3.58172 40 0 36.4183 0 32V0H8C21.2548 0 32 10.7452 32 24V80Z"
                            fill="#2A7047" />
                    </svg>
                </div>
                <a href="index.html" class="nav-title">habitat</a>
            </div>

            <div class="nav-links">
                <a href="users.html" class="nav-link nav-link-active">for users</a>
                <a href="developers.html" class="nav-link">for developers</a>
            </div>
        </nav>

        <!-- Content -->
        <main class="hero">
            <div class="hero-inner">
                <h1 class="hero-headline">
                    Take back control of your data, with habitat.<br>
                </h1>
                <ul class="section-list">
                    <li>Your data is yours, forever. You pick who gets to see it.</li>
                    <li>Choose or build your favorite < note-taking> app: your data goes where you go.</li>
                    <li>All your data in one place: see it, search it, ask it questions.</li>
                </ul>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="social-icons">
                <a href="https://bsky.app/profile/habitat.network" target="_blank" rel="noopener noreferrer"
                    class="social-link" aria-label="Bluesky">
                    <img src="icons/bluesky_black.svg" alt="Bluesky" width="20">
                </a>
                <a href="https://github.com/habitat-network/habitat" target="_blank" rel="noopener noreferrer"
                    class="social-link" aria-label="GitHub">
                    <img src="icons/github.svg" alt="GitHub" width="20">
                </a>
                <a href="https://habitat.leaflet.pub" target="_blank" rel="noopener noreferrer" class="social-link"
                    aria-label="Leaflet.pub">
                    <img src="icons/leaflet.svg" alt="Leaflet" width="20">
                </a>
            </div>
        </footer>

    </div>
</body>

</html>
